<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lab05 - Câu 1</title>
  <style>
    body {
      margin: 0;
      padding: 4px;
      font-family: "Times New Roman", serif;
      font-size: 14px;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    a {
      color: #000;
      text-decoration: none;
    }

    .menu-ngang {
      width: 560px;
      height: 50px;
      background: #00ffff;
    }

    .menu-ngang li {
      float: left;
    }

    .menu-ngang a {
      display: block;
      padding: 17px 11px;
      font-weight: bold;
    }

    .menu-ngang a:hover {
      color: #fff;
      background: #ff9966;
      border-radius: 4px;
    }

    .menu-doc {
      width: 290px;
      margin-top: 4px;
    }

    .menu-doc a {
      display: block;
      height: 42px;
      line-height: 42px;
      padding-left: 12px;
      color: #000;
      background: #6699e8;
      border-bottom: 1px solid #fff;
      font-weight: bold;
    }

    .menu-doc a:hover {
      color: #fff;
      background: #ff9966;
    }

    .clear {
      clear: both;
    }
  </style>
</head>
<body>
  <ul class="menu-ngang">
    <li><a href="#">Trang chủ</a></li>
    <li><a href="#">Giới thiệu</a></li>
    <li><a href="#">Sản phẩm</a></li>
    <li><a href="#">Dịch vụ</a></li>
    <li><a href="#">Liên hệ</a></li>
  </ul>

  <div class="clear"></div>

  <ul class="menu-doc">
    <li><a href="#">Trang chủ</a></li>
    <li><a href="#">Giới thiệu</a></li>
    <li><a href="#">Sản phẩm</a></li>
    <li><a href="#">Dịch vụ</a></li>
    <li><a href="#">Liên hệ</a></li>
  </ul>
</body>
</html>
